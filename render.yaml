# Render Blueprint for Doble — ONE web service runs the whole stack
# (gateway + AI + dashboard) from Dockerfile.render. The WhatsApp session lives
# in DynamoDB (WA_AUTH_STORE=dynamo) so Render's ephemeral disk is a non-issue.
#
# Postgres+pgvector is external (Render's free PG expires) — point DATABASE_URL
# at Neon or Supabase (both free, both ship pgvector). See docs/DEPLOY-RENDER.md.
#
# Secrets (sync:false) are left blank on purpose — set them in the Render
# dashboard. Everything else is baked in, so you only configure this one service.

services:
  - type: web
    name: doble
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL # Neon/Supabase Postgres (with pgvector), sslmode=require
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBED_MODEL
        value: gemini-embedding-001
      - key: GEMINI_EMBED_DIM
        value: "1536"
      - key: WA_AUTH_STORE
        value: dynamo
      - key: WA_AUTH_TABLE
        value: doble-whatsapp-auth
      - key: WA_SESSION_ID
        value: default
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID # IAM user limited to the auth table
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD # gates the public dashboard — REQUIRED here
        sync: false
