services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wa_agent_postgres
    environment:
      POSTGRES_USER: wa_agent
      POSTGRES_PASSWORD: wa_agent_dev
      POSTGRES_DB: wa_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa_agent -d wa_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
