services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doble_postgres
    environment:
      POSTGRES_USER: wa_agent
      POSTGRES_PASSWORD: wa_agent_dev
      POSTGRES_DB: wa_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa_agent -d wa_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: doble_ai
    environment:
      DATABASE_URL: postgresql://wa_agent:wa_agent_dev@postgres:5432/wa_agent
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY must be set}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      GEMINI_EMBED_MODEL: ${GEMINI_EMBED_MODEL:-gemini-embedding-001}
      GEMINI_EMBED_DIM: ${GEMINI_EMBED_DIM:-1536}
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: doble_gateway
    environment:
      DATABASE_URL: postgresql://wa_agent:wa_agent_dev@postgres:5432/wa_agent
      AI_SERVICE_URL: http://ai:8000
      GATEWAY_PORT: 3000
      WA_SESSION_DIR: /app/.wa-session
      WA_MEDIA_DIR: /app/.wa-media
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - wa_session:/app/.wa-session
      - wa_media:/app/.wa-media
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doble_frontend
    depends_on:
      - gateway
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  postgres_data:
  wa_session:
  wa_media:
